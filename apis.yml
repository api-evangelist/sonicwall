aid: sonicwall
name: SonicWall
description: >-
  SonicWall is a Milpitas, California cybersecurity company that has been
  defending small and medium-sized businesses, enterprises, and managed
  service providers from cyber crime for more than 25 years. The company
  builds network security firewalls, secure access service edge (SASE)
  offerings, cloud email security, endpoint protection, and managed
  detection and response services. The SonicOS operating system that runs
  on TZ, NSa, NSsp, and NSv next-generation firewalls exposes an on-device
  REST API (SonicOS API) for configuration, monitoring, and policy
  management, but SonicWall does not publish a centralized OpenAPI
  specification — API documentation is shipped per SonicOS release as
  HTML and PDF reference manuals at sonicwall.com/support. SonicWall
  additionally operates the Capture Advanced Threat Protection (Capture
  ATP) cloud sandbox API and the Cloud Secure Edge (CSE) management
  surface, with reference SDKs in Node.js, Python, and PHP published in
  the github.com/sonicwall organization. The company also publishes
  CloudFormation and Azure Resource Manager templates for deploying NSv
  virtual firewalls. SonicWall's revenue model is firewall hardware
  sales, security service subscriptions, cloud security subscriptions,
  and managed services — there is no public consumer developer program
  or self-service signup for the firewall APIs (the SonicOS API is
  accessed against the customer's own firewall device).
